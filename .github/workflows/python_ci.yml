name: Practice github action
on: [push]
jobs:
  test-program:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        run: git clone https://github.com/Amir-dev0/gha-lab-1.git
      - name: changing working directory  
        run: cd gha-lab-1
      - name: Installing requirements
        run: pip install -r requirements.txt
      - name: Testing  
        run: pytest test_program.py