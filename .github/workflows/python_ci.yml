name: Practice github action
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Installing dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests  
        id: tests
        run: python -m pytest tests/test_api.py
        continue-on-error: false
   
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: action/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build docker image
        run: |
         docker build -t mywebserver:${{ github.sha }} .

      - name: Run Docker container
        run: |
          docker run -d -p 8080:80 --name webserver mywebserver:${{ github.sha }}

      - name: Test container is running
        run: |
          sleep 5
          docker ps | grep mywebserver     
          curl http://localhost:8080
